spring:
  application:
    name: mei-organizadin

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mei_organizadin}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      data-source-properties:
        reWriteBatchedInserts: ${POSTGRES_REWRITE_BATCHED_INSERTS:true}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: ${HIBERNATE_BATCH_SIZE:200}
        order_inserts: ${HIBERNATE_ORDER_INSERTS:true}
        order_updates: ${HIBERNATE_ORDER_UPDATES:true}

  flyway:
    enabled: true
    locations: classpath:db/migration

google:
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID}
    client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
    token-uri: https://oauth2.googleapis.com/token
    auth-uri: https://accounts.google.com/o/oauth2/auth
  calendar:
    sync:
      max-results: ${GOOGLE_CALENDAR_SYNC_MAX_RESULTS:2500}
      fields: ${GOOGLE_CALENDAR_SYNC_FIELDS:items(id,summary,status,start,end),nextPageToken,nextSyncToken}

sync:
  freshness-minutes: ${SYNC_FRESHNESS_MINUTES:30}

calendar:
  sync:
    batch-size: ${CALENDAR_SYNC_BATCH_SIZE:1000}
    batch-clear-enabled: ${CALENDAR_SYNC_BATCH_CLEAR_ENABLED:true}

server:
  port: ${SERVER_PORT:8080}

auth:
  session:
    jwt-secret: ${AUTH_SESSION_JWT_SECRET:change-me-change-me-change-me-change-me}
    access-token-ttl-seconds: ${AUTH_SESSION_ACCESS_TOKEN_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${AUTH_SESSION_REFRESH_TOKEN_TTL_SECONDS:2592000}
    refresh-retry-safety-window-seconds: ${AUTH_SESSION_REFRESH_RETRY_SAFETY_WINDOW_SECONDS:20}
